name: Playwright Tests

on:
  push:
    branches: [main, master]
    # TỐI ƯU B (Path Filtering): Không kích hoạt chạy test nếu chỉ sửa các file tài liệu hoặc config không liên quan
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

# 1. CHỨC NĂNG CRONJOB TỰ ĐỘNG CHẠY MỖI ĐÊM
  schedule:
    # Cú pháp: Phút(0-59) Giờ(0-23) Ngày_Trong_Tháng(*) Tháng(*) Ngày_Trong_Tuần(*)
    # 0 19 * * * nghĩa là: 19 giờ 00 phút UTC mỗi ngày (Tức là 02:00 sáng giờ VN)
    - cron: '0 19 * * *'

  # 2. BÙA HỘ MỆNH: CHO PHÉP BẤM NÚT CHẠY BẰNG TAY (Nên có)
  workflow_dispatch:

jobs:
  # ==========================================
  # JOB 1: CHẠY TEST SONG SONG TRÊN 3 MÁY (SHARDING)
  # ==========================================
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # TỐI ƯU C (Sharding): Khai báo 3 máy ảo chạy song song
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - uses: actions/checkout@v4
      
      # TỐI ƯU A (Caching): Cache lại thư viện Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      # TỐI ƯU A (Caching): Cache lại các trình duyệt của Playwright (Chrome, Firefox...)
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Chạy Test chia luồng (Thêm cờ --reporter=blob để chỉ xuất dữ liệu thô)
      - name: Run Playwright tests
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --reporter=blob
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:8080' }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://be-truytimkhobau-sc.attops.net' }}

      # Đẩy file blob thô của mỗi máy lên không gian lưu trữ trung gian của GitHub
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

  # ==========================================
  # JOB 2: MÁY ẢO TỔNG HỢP (GỘP BÁO CÁO & BẮN TELEGRAM)
  # ==========================================
  merge-reports:
    if: always()
    needs: test # Bắt buộc phải chờ Job 'test' (cả 3 máy) chạy xong mới được chạy Job này
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      # Tải toàn bộ 3 cục blob từ 3 máy ảo ở Job 1 về máy hiện tại
      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      # BÙA HỘ MỆNH: Lệnh Gộp (Nó sẽ đọc config và đẻ ra file HTML + JSON tổng ở thư mục playwright-report)
      - name: Merge into HTML and JSON
        run: npx playwright merge-reports --config=config/playwright.config.ts ./all-blob-reports

      # Gói báo cáo HTML đã gộp lại để đưa lên Web (GitHub Pages)
      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # -----------------------------------------------------------------
      # CÁC BƯỚC XỬ LÝ TELEGRAM (Y hệt như bạn đang có)
      # -----------------------------------------------------------------
      
     # 1. BƯỚC TRÍCH XUẤT (Bỏ if: failure, luôn chạy để tự check kết quả)
      - name: Trích xuất thông tin lỗi và Hình ảnh
        if: always()
        run: |
          REPORT_FILE=$(find . -type f -name "results.json" | head -n 1)
          export REPORT_FILE_PATH="$REPORT_FILE"

          node -e "
          const fs = require('fs');
          const envFile = process.env.GITHUB_ENV;
          const reportPath = process.env.REPORT_FILE_PATH;
          
          let failCount = 0;
          let isFailed = 'false';
          let errorDetails = '';

          if (reportPath && fs.existsSync(reportPath)) {
              const data = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              failCount = data.stats ? data.stats.unexpected : 0;
              
              if (failCount > 0) {
                  isFailed = 'true';
                  let failedTests = [];
                  function extractFailures(suites) {
                      for (const suite of suites) {
                          for (const spec of (suite.specs || [])) {
                              if (spec.ok === false) {
                                  let testName = spec.title;
                                  let errMsg = 'Lỗi không xác định';
                                  for (const test of (spec.tests || [])) {
                                      for (const res of (test.results || [])) {
                                          if ((res.status === 'failed' || res.status === 'timedOut') && res.error && res.error.message) {
                                              errMsg = res.error.message.split('\n').slice(0, 3).join('\n');
                                          }
                                      }
                                  }
                                  failedTests.push('👉 TEST: ' + testName + '\n' + errMsg);
                              }
                          }
                          if (suite.suites) extractFailures(suite.suites);
                      }
                  }
                  extractFailures(data.suites || []);
                  
                  if (failedTests.length > 0) {
                      const displayCount = Math.min(failedTests.length, 3);
                      errorDetails = failedTests.slice(0, displayCount).join('\n\n');
                      if (failedTests.length > 3) {
                          errorDetails += '\n\n... và ' + (failedTests.length - 3) + ' testcases khác bị lỗi.';
                      }
                  }
              }
          } else {
              isFailed = 'true';
              failCount = 'Không rõ';
              errorDetails = 'Lỗi: Không tìm thấy file results.json sau khi merge.';
          }
          
          fs.appendFileSync(envFile, 'IS_FAILED=' + isFailed + '\n');
          fs.appendFileSync(envFile, 'FAIL_COUNT=' + failCount + '\n');
          fs.appendFileSync(envFile, 'ERROR_MSG<<EOF\n' + (errorDetails || 'Không có lỗi') + '\nEOF\n');
          "
          
          PHOTO_PATH=$(find . -type f -name "*.png" | head -n 1)
          echo "PHOTO_PATH=$PHOTO_PATH" >> $GITHUB_ENV

      # 2. GỬI TELEGRAM (Kiểm tra bằng biến IS_FAILED tự tạo)
      - name: Bắn thông báo Telegram (PASS)
        uses: appleboy/telegram-action@master
        if: env.IS_FAILED == 'false'
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ [PASS] CẢNH BÁO CI/CD PLAYWRIGHT
            --------------------------------------
            🎉 Tuyệt vời! Toàn bộ Testcase đều chạy thành công.
            👤 Kích hoạt bởi: ${{ github.actor }}
            🌿 Nhánh: ${{ github.ref_name }}
            🔗 Báo cáo: https://paizaatt.github.io/PlaywrightAutomation/

      - name: Bắn thông báo Telegram (FAIL)
        uses: appleboy/telegram-action@master
        if: env.IS_FAILED == 'true'
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ [FAIL] CẢNH BÁO CI/CD PLAYWRIGHT
            --------------------------------------
            ⚠️ Tổng số Testcase bị Fail: ${{ env.FAIL_COUNT }}
            👤 Kích hoạt bởi: ${{ github.actor }}
            
            📝 CHI TIẾT CÁC LỖI (Tối đa 3 case):
            ${{ env.ERROR_MSG }}
            
            🔗 Xem báo cáo tại:
            https://paizaatt.github.io/PlaywrightAutomation/

      - name: Gửi ảnh chụp màn hình lỗi (Tự động quét)
        if: env.IS_FAILED == 'true'
        run: |
          PHOTOS=$(find . -type f -name "*.png" -not -path "*/node_modules/*" | head -n 3)
          if [ -z "$PHOTOS" ]; then exit 0; fi
          for PHOTO in $PHOTOS; do
            FILENAME=$(basename "$PHOTO")
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendPhoto" \
              -F chat_id="${{ secrets.TELEGRAM_TO }}" \
              -F photo="@$PHOTO" \
              -F caption="📸 Ảnh chụp từ: $FILENAME"
          done

      - name: Xuất báo cáo lên GitHub Pages (Xem Online)
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          publish_branch: gh-pages

      # 3. ÉP GITHUB ACTIONS BÁO ĐỎ NẾU CÓ LỖI (ĐỂ PIPELINE KHÔNG BỊ XANH ẢO)
      - name: Đánh dấu Pipeline là Failed
        if: env.IS_FAILED == 'true'
        run: exit 1
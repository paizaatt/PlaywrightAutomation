name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm test
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:8080' }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://be-truytimkhobau-sc.attops.net' }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30  

      # 1. BƯỚC TRÍCH XUẤT DỮ LIỆU LỖI BẰNG NODE.JS (Lấy nhiều Testcase)
      - name: Trích xuất thông tin lỗi và Hình ảnh
        if: failure()
        run: |
          REPORT_FILE=$(find . -type f -name "results.json" | head -n 1)
          export REPORT_FILE_PATH="$REPORT_FILE"

          node -e "
          const fs = require('fs');
          const envFile = process.env.GITHUB_ENV;
          const reportPath = process.env.REPORT_FILE_PATH;
          
          let failCount = 'Không đếm được';
          let errorDetails = 'Không tìm thấy file results.json.';

          if (reportPath && fs.existsSync(reportPath)) {
              const data = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              failCount = data.stats ? data.stats.unexpected : 0;
              
              let failedTests = [];
              for (const suite of (data.suites || [])) {
                  for (const spec of (suite.specs || [])) {
                      for (const test of (spec.tests || [])) {
                          for (const res of (test.results || [])) {
                              if (res.status === 'failed' || res.status === 'timedOut') {
                                  let testName = spec.title;
                                  // Cắt lấy tối đa 3 dòng lỗi của mỗi testcase để tin nhắn không bị tràn
                                  let errMsg = res.error && res.error.message ? res.error.message.split('\n').slice(0, 3).join('\n') : 'Lỗi không xác định';
                                  failedTests.push('👉 TEST: ' + testName + '\n' + errMsg);
                              }
                          }
                      }
                  }
              }
              
              if (failedTests.length > 0) {
                  // Chỉ lấy tối đa 3 lỗi đầu tiên để gửi Telegram
                  const displayCount = Math.min(failedTests.length, 3);
                  errorDetails = failedTests.slice(0, displayCount).join('\n\n');
                  
                  if (failedTests.length > 3) {
                      errorDetails += '\n\n... và ' + (failedTests.length - 3) + ' testcases khác. (Vui lòng xem chi tiết trong link báo cáo).';
                  }
              } else {
                  errorDetails = 'Không trích xuất được chi tiết lỗi.';
              }
          }
          
          fs.appendFileSync(envFile, 'FAIL_COUNT=' + failCount + '\n');
          fs.appendFileSync(envFile, 'ERROR_MSG<<EOF\n' + errorDetails + '\nEOF\n');
          "
          
          PHOTO_PATH=$(find . -type f -name "*.png" | head -n 1)
          echo "PHOTO_PATH=$PHOTO_PATH" >> $GITHUB_ENV

      # 2. GỬI TIN NHẮN KHI PASS (Màu xanh)
      - name: Bắn thông báo Telegram (PASS)
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ [PASS] CẢNH BÁO CI/CD PLAYWRIGHT
            --------------------------------------
            🎉 Tuyệt vời! Toàn bộ Testcase đều chạy thành công.
            👤 Kích hoạt bởi: ${{ github.actor }}
            🌿 Nhánh: ${{ github.ref_name }}
            🔗 Báo cáo: https://paizaatt.github.io/PlaywrightAutomation/

      # 3. GỬI TIN NHẮN KHI FAIL KÈM ẢNH (Màu đỏ)
      - name: Bắn thông báo Telegram (FAIL)
        uses: appleboy/telegram-action@master
        if: failure()
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          photo: ${{ env.PHOTO_PATH }}
          message: |
            ❌ [FAIL] CẢNH BÁO CI/CD PLAYWRIGHT
            --------------------------------------
            ⚠️ Tổng số Testcase bị Fail: ${{ env.FAIL_COUNT }}
            👤 Kích hoạt bởi: ${{ github.actor }}
            
            📝 CHI TIẾT CÁC LỖI (Tối đa 3 case):
            ${{ env.ERROR_MSG }}
            
            🔗 Xem toàn bộ báo cáo tại:
            https://paizaatt.github.io/PlaywrightAutomation/

      - name: Xuất báo cáo lên GitHub Pages (Xem Online)
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          publish_branch: gh-pages

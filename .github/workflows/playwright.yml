name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm test
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:8080' }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://be-truytimkhobau-sc.attops.net' }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30  
      - name: Bắn thông báo Telegram
        uses: appleboy/telegram-action@master
        if: always() # Bắt buộc phải có dòng này để dù test Fail thì bot vẫn báo
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🤖 CẢNH BÁO CI/CD PLAYWRIGHT
            --------------------------------------
            Trạng thái chạy: ${{ job.status == 'success' && '✅ PASS' || '❌ FAIL' }}
            Kích hoạt bởi: ${{ github.actor }}
            Nhánh cập nhật: ${{ github.ref_name }}
            
            🔗 Xem báo cáo chi tiết tại:
            https://paizaatt.github.io/PlaywrightAutomation/    
      - name: Xuất báo cáo lên GitHub Pages (Xem Online)
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          publish_branch: gh-pages
